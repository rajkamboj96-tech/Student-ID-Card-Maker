<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kamboj SoftWares ID Maker Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Lobster&family=Oswald&family=Pacifico&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="manifest" href="manifest.json">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js').then(reg => {
            console.log('App is ready for offline use!', reg);
          }).catch(err => {
            console.log('Service Worker failed:', err);
          });
        });
      }
    </script>

    <style>
        :root { --primary: #0056b3; --bg: #f1f3f6; }
        body { font-family: Arial, sans-serif; background: var(--bg); margin: 0; padding: 0; overflow: hidden; }

        .sticky-header { position: sticky; top: 0; z-index: 1000; width: 100%; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        .action-toolbar { display: flex; width: 100%; background: #e2e8f0; border-bottom: 1px solid #cbd5e1; padding: 6px 2px; justify-content: space-evenly; gap: 2px; }
        .action-btn { background: #fff; border: 1px solid #94a3b8; border-radius: 4px; padding: 4px; cursor: pointer; color: #334155; display: flex; align-items: center; justify-content: center; height: 28px; min-width: 32px; flex: 1; max-width: 40px; }
        .action-btn:hover { background: #cbd5e1; }
        .action-btn i { width: 16px; height: 16px; } 
        .action-btn.active-mode { background: #22c55e; color: white; border-color: #16a34a; }
        .action-btn.danger-mode { background: #fee2e2; color: #dc3545; border-color: #dc3545; }

        .mobile-toolbar { display: flex; width: 100%; background: #fff; border-bottom: 2px solid var(--primary); padding: 4px 0; justify-content: space-around; }
        .tool-icon { display: flex; flex-direction: column; align-items: center; cursor: pointer; color: #444; padding: 4px; border-radius: 6px; }
        .tool-icon i { width: 14px; height: 14px; }
        .tool-icon.active { color: var(--primary); background: #f0f7ff; }

        .context-panel { width: 100%; background: #fff; display: none; padding: 8px 10px; box-sizing: border-box; border-bottom: 1px solid #ddd; max-height: 45vh; overflow-y: auto; }
        .form-group { margin-bottom: 5px; }
        .form-group label { display: block; font-size: 11px; font-weight: bold; color: #555; margin-bottom: 2px; }
        input[type="text"], input[type="number"], select { width: 100%; padding: 4px 6px; border: 1px solid #ccc; border-radius: 4px; font-size: 12px; height: 28px; box-sizing: border-box; }
        input[type="color"].color-box { padding: 0; width: 100%; height: 28px; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; }
        
        .btn-row { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
        .btn { flex: 1; padding: 4px; background: var(--primary); color: white; border: none; border-radius: 4px; font-weight: bold; font-size: 11px; cursor: pointer; height: 28px; display: flex; align-items: center; justify-content: center; }
        .btn-danger { background: #dc3545; }
        .btn-warning { background: #ffc107; color: #000; }
        .btn-success { background: #28a745; color: white; }
        .btn-icon { background: #f0f0f0; color: #333; flex: 0 0 32px; border: 1px solid #ddd; font-size: 14px;}

        .effects-grid { display: grid; grid-template-columns: 1fr; gap: 4px; }
        @media (min-width: 768px) {
            .effects-grid { grid-template-columns: repeat(4, 1fr); gap: 8px; }
            .context-panel { max-height: 55vh; }
        }
        .effect-item { display: flex; flex-direction: column; gap: 2px; align-items: center; margin-bottom: 2px; }
        .effect-item label { margin: 0; font-size: 10px; color: #444; font-weight: bold; text-align: center; }
        
        .effect-row-compact { display: flex; align-items: center; gap: 4px; width: 100%; justify-content: flex-start; padding: 2px 0; }
        .mini-label { font-size: 9px; font-weight: bold; color: #333; white-space: nowrap; flex: 0 0 50px; text-align: left; line-height: 1; }

        .slider-group { display: flex; align-items: center; gap: 3px; width: 100%; justify-content: center; }
        .btn-step { background: #e0e0e0; border: 1px solid #ccc; border-radius: 3px; width: 20px; height: 20px; font-weight: bold; font-size: 14px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #333; padding: 0; line-height: 1; }
        input[type="range"] { flex: 1; height: 10px; accent-color: var(--primary); cursor: pointer; margin: 0; }
        input[type="color"] { width: 22px; height: 20px; padding: 0; border: 1px solid #ccc; border-radius: 3px; cursor: pointer; flex-shrink: 0; }

        .workspace { padding: 10px; display: flex; justify-content: center; width: 100%; height: calc(100vh - 90px); overflow: auto; padding-bottom: 50px; position: relative; }
        .id-card { width: 259.2px; height: 451.2px; border: 1px solid #bbb; border-radius: 10px; background-color: white; box-shadow: 0 8px 20px rgba(0,0,0,0.1); position: relative; overflow: visible; flex-shrink: 0; box-sizing: border-box; transform-origin: top center; transition: transform 0.1s ease-out; }

        .draggable { position: absolute; cursor: move; z-index: 10; touch-action: none; box-sizing: border-box; }
        .resizable { resize: both; overflow: hidden; }
        .selected { outline: 2px dashed #ff0000; outline-offset: 1px; }
        
        .text-item { 
            font-size: 14px; 
            font-weight: bold; 
            padding: 2px 4px; 
            color: #000; 
            word-wrap: break-word; 
            min-width: 20px; 
            white-space: pre-wrap; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center;
            box-sizing: border-box;
        }
        
        .img-item img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        .zoom-controls { position: fixed; bottom: 30px; left: 15px; display: flex; flex-direction: column; gap: 10px; z-index: 1500; }
        .zoom-controls button { width: 40px; height: 40px; border-radius: 50%; background: var(--primary); color: white; font-size: 24px; font-weight: bold; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        .watermark { position: fixed; bottom: 5px; right: 10px; font-size: 12px; color: blue; font-weight: bold; z-index: 2000; pointer-events: none; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="sticky-header">
        <div class="action-toolbar">
            <button class="action-btn" id="multiSelectToggleBtnTop" onclick="toggleMultiSelectMode()" title="Select/Unselect Multiple"><i data-lucide="check-square"></i></button>
            <button class="action-btn" id="lockBtnTop" onclick="toggleLock()" title="Lock/Unlock BG"><i data-lucide="unlock"></i></button>
            <button class="action-btn" onclick="editSelectedText()" title="Edit"><i data-lucide="edit"></i></button>
            <button class="action-btn" onclick="doCopy()" title="Copy"><i data-lucide="copy"></i></button>
            <button class="action-btn" onclick="doPaste()" title="Paste"><i data-lucide="clipboard-paste"></i></button>
            <button class="action-btn" style="color: #0284c7; border-color: #0284c7;" onclick="generateAutoQRCode()" title="Auto QR Code"><i data-lucide="qr-code"></i></button>
            <button class="action-btn" style="color: #dc3545; border-color: #dc3545;" onclick="deleteSelected()" title="Delete"><i data-lucide="trash-2"></i></button>
            <button class="action-btn" style="color: #ea580c; border-color: #ea580c;" onclick="clearAllElements()" title="Clear All"><i data-lucide="eraser"></i></button>
        </div>

        <div class="mobile-toolbar">
            <div class="tool-icon" onclick="togglePanel('p-layers', this)" title="Layers (1)"><i data-lucide="layers"></i></div>
            <div class="tool-icon" onclick="togglePanel('p-text', this)" title="Text (2)"><i data-lucide="type"></i></div>
            <div class="tool-icon" onclick="togglePanel('p-design', this)" title="Design (3)"><i data-lucide="palette"></i></div>
            <div class="tool-icon" onclick="togglePanel('p-effects', this)" title="Effects (4)"><i data-lucide="wand-2"></i></div>
            <div class="tool-icon" onclick="togglePanel('p-media', this)" title="Media (5)"><i data-lucide="image"></i></div>
            <div class="tool-icon" onclick="handleUndo()" title="Undo"><i data-lucide="undo-2"></i></div>
            <div class="tool-icon" onclick="handleRedo()" title="Redo"><i data-lucide="redo-2"></i></div>
            <div class="tool-icon" onclick="togglePanel('p-project', this)" title="Project (6)"><i data-lucide="save"></i></div>
            <div class="tool-icon" style="color: #dc3545;" onclick="hardResetApp()" title="Reset All Data"><i data-lucide="trash-2"></i></div>
        </div>
    </div>

    <div class="zoom-controls">
        <button onclick="zoomCard(0.1)">+</button>
        <button onclick="zoomCard(-0.1)">-</button>
        <button onclick="resetZoomAndSave()" style="background:#4b5563; font-size:16px;" title="Reset Zoom & Save">⟲</button>
    </div>

    <div id="p-layers" class="context-panel">
        <div style="display:flex; gap:5px; margin-bottom:5px; align-items:center;">
            <label style="margin:0; font-size:10px; font-weight:bold; white-space:nowrap;">Card W(in):</label>
            <input type="number" step="0.1" id="cardWidth" value="2.7" onchange="resizeCard()" title="Card Width (Inches)" style="flex:1;">
            <label style="margin:0; font-size:10px; font-weight:bold; white-space:nowrap;">Card H(in):</label>
            <input type="number" step="0.1" id="cardHeight" value="4.7" onchange="resizeCard()" title="Card Height (Inches)" style="flex:1;">
            <label style="margin:0; font-size:10px; font-weight:bold; white-space:nowrap;">Res:</label>
            <input type="number" id="cardRes" value="96" onchange="resizeCard()" title="Resolution (Pixels per Inch)" style="flex:1;">
        </div>
        
        <div class="form-group" style="margin-top: 8px;">
            <label>Add 2D/3D Shapes</label>
            <div style="display:flex; gap:4px; align-items: center;">
                <select id="shapeSelect" style="flex:2; font-size:12px; padding:2px;">
                    <option value="square">Square</option>
                    <option value="triangle">Triangle</option>
                    <option value="circle">Circle</option>
                    <option value="half_circle">Half Circle</option>
                    <option value="cube">Cube</option>
                    <option value="cylinder">Cylinder</option>
                    <option value="prism">Prism</option>
                    <option value="sphere">Sphere</option>
                    <option value="hemisphere">Hemisphere</option>
                </select>
                <input type="color" id="shapeColor" class="color-box" value="#0056b3" style="flex:1;" title="Shape Color">
                <button class="btn btn-success" onclick="addShape()" style="flex:1;" title="Add Shape"><i data-lucide="plus" style="width:16px;"></i></button>
            </div>
        </div>

        <div class="effects-grid" style="grid-template-columns: repeat(2, 1fr); gap: 4px; margin-top: 8px;">
            <div class="effect-item">
                <label>Box Width</label>
                <div class="slider-group">
                    <button class="btn-step" onclick="stepPercentSlider('widthSlider', -4, () => resizeSelectedItem(true))">-</button>
                    <input type="range" id="widthSlider" min="10" max="600" value="100" oninput="resizeSelectedItem(false)" onchange="resizeSelectedItem(true)">
                    <button class="btn-step" onclick="stepPercentSlider('widthSlider', 4, () => resizeSelectedItem(true))">+</button>
                </div>
            </div>
            <div class="effect-item">
                <label>Box Height</label>
                <div class="slider-group">
                    <button class="btn-step" onclick="stepPercentSlider('heightSlider', -4, () => resizeSelectedItem(true))">-</button>
                    <input type="range" id="heightSlider" min="10" max="600" value="100" oninput="resizeSelectedItem(false)" onchange="resizeSelectedItem(true)">
                    <button class="btn-step" onclick="stepPercentSlider('heightSlider', 4, () => resizeSelectedItem(true))">+</button>
                </div>
            </div>
        </div>
    </div>

    <div id="p-text" class="context-panel">
        <div class="form-group">
            <label>Add / Select Text & Font</label>
            <div style="display:flex; gap:4px; margin-bottom: 4px; align-items: center;">
                <input type="text" id="customTextInput" placeholder="ਟੈਕਸਟ ਲਿਖੋ..." style="flex:1; min-width: 0;">
                
                <button class="btn" style="flex:0 0 35px; padding: 0;" onclick="addCustomText()" title="Add Text">
                    <i data-lucide="plus" style="width:16px;"></i>
                </button>
                
                <select id="fontFamilySelect" onchange="changeFontFamily(this.value)" style="width: 70px; padding: 2px 4px; font-size: 11px; height: 28px;" title="Font Type">
                    <option value="Arial, sans-serif">Arial</option>
                    <option value="'Times New Roman', Times, serif">Times</option>
                    <option value="'Courier New', Courier, monospace">Courier</option>
                    <option value="'Georgia', serif">Georgia</option>
                    <option value="'Impact', sans-serif">Impact</option>
                    <option value="'Roboto', sans-serif">Roboto</option>
                    <option value="'Oswald', sans-serif">Oswald</option>
                    <option value="'Lobster', cursive">Lobster</option>
                    <option value="'Pacifico', cursive">Pacifico</option>
                    <option value="'Dancing Script', cursive">Dancing Script</option>
                    <option value="'Comic Sans MS', cursive, sans-serif">Comic Sans</option>
                </select>

                <select id="newTextSize" onchange="changeFontSizeCombo(this.value)" style="width: 45px; padding: 2px 4px; font-size: 11px; height: 28px;" title="Text Size">
                    <option value="10">10</option>
                    <option value="12">12</option>
                    <option value="14" selected>14</option>
                    <option value="16">16</option>
                    <option value="18">18</option>
                    <option value="20">20</option>
                    <option value="24">24</option>
                    <option value="28">28</option>
                    <option value="32">32</option>
                    <option value="36">36</option>
                    <option value="40">40</option>
                    <option value="50">50</option>
                    <option value="60">60</option>
                </select>
            </div>
        </div>
        
        <div class="btn-row" style="flex-wrap: nowrap; overflow-x: auto; padding-bottom: 2px; margin-top: 6px;">
            <button class="btn btn-icon" onclick="applyFormat('bold')" title="Bold"><i data-lucide="bold" style="width:14px;"></i></button>
            <button class="btn btn-icon" onclick="applyFormat('italic')" title="Italic"><i data-lucide="italic" style="width:14px;"></i></button>
            <button class="btn btn-icon" onclick="positionElement('left')" title="Align Left"><i data-lucide="align-left" style="width:14px;"></i></button>
            <button class="btn btn-icon" onclick="positionElement('center')" title="Align Center"><i data-lucide="align-center" style="width:14px;"></i></button>
            <button class="btn btn-icon" onclick="positionElement('right')" title="Align Right"><i data-lucide="align-right" style="width:14px;"></i></button>
            
            <input type="color" style="height:28px; flex: 0 0 35px; width: 35px;" class="color-box" oninput="applyColor(this.value, 'text', false)" onchange="applyColor(this.value, 'text', true)" title="Text Color">
            <input type="color" style="height:28px; flex: 0 0 35px; width: 35px;" class="color-box" oninput="applyColor(this.value, 'bg', false)" onchange="applyColor(this.value, 'bg', true)" title="Item/Shape BG Color">
        </div>
    </div>

    <div id="p-design" class="context-panel">
        <div class="effects-grid" style="grid-template-columns: repeat(2, 1fr); margin-bottom: 6px;">
            <div class="effect-item">
                <label>Drop Shadow</label>
                <div class="slider-group">
                    <button class="btn-step" onclick="stepPercentSlider('shadowSlider', -4, () => changeShadow(true))">-</button>
                    <input type="range" id="shadowSlider" min="0" max="40" value="0" oninput="changeShadow(false)" onchange="changeShadow(true)">
                    <button class="btn-step" onclick="stepPercentSlider('shadowSlider', 4, () => changeShadow(true))">+</button>
                </div>
            </div>
            <div class="effect-item">
                <label>Shadow Angle</label>
                <div class="slider-group">
                    <button class="btn-step" onclick="stepPercentSlider('shadowAngleSlider', -4, () => changeShadow(true))">-</button>
                    <input type="range" id="shadowAngleSlider" min="0" max="360" value="45" oninput="changeShadow(false)" onchange="changeShadow(true)">
                    <button class="btn-step" onclick="stepPercentSlider('shadowAngleSlider', 4, () => changeShadow(true))">+</button>
                </div>
            </div>
            
            <div class="effect-item">
                <label style="display:flex; justify-content:center; align-items:center; gap:5px;">
                    3D Depth 
                    <input type="color" id="depthColor" value="#888888" oninput="apply3DDepth(false)" onchange="apply3DDepth(true)" style="width:14px;height:14px;padding:0; border:none; cursor:pointer;" title="3D Color">
                </label>
                <div class="slider-group">
                    <button class="btn-step" onclick="stepPercentSlider('depthSlider', -4, () => apply3DDepth(true))">-</button>
                    <input type="range" id="depthSlider" min="0" max="50" value="0" oninput="apply3DDepth(false)" onchange="apply3DDepth(true)">
                    <button class="btn-step" onclick="stepPercentSlider('depthSlider', 4, () => apply3DDepth(true))">+</button>
                </div>
            </div>
            <div class="effect-item">
                <label>3D Angle</label>
                <div class="slider-group">
                    <button class="btn-step" onclick="stepPercentSlider('depthAngleSlider', -4, () => apply3DDepth(true))">-</button>
                    <input type="range" id="depthAngleSlider" min="0" max="360" value="45" oninput="apply3DDepth(false)" onchange="apply3DDepth(true)">
                    <button class="btn-step" onclick="stepPercentSlider('depthAngleSlider', 4, () => apply3DDepth(true))">+</button>
                </div>
            </div>

            <div class="effect-item">
                <label>Rotate (Circular)</label>
                <div class="slider-group">
                    <button class="btn-step" onclick="stepPercentSlider('rotateSlider', -4, () => rotateSelectedItem(true))">-</button>
                    <input type="range" id="rotateSlider" min="0" max="360" value="0" oninput="rotateSelectedItem(false)" onchange="rotateSelectedItem(true)">
                    <button class="btn-step" onclick="stepPercentSlider('rotateSlider', 4, () => rotateSelectedItem(true))">+</button>
                </div>
            </div>
            <div class="effect-item">
                <label>Line Spacing</label>
                <div class="slider-group">
                    <button class="btn-step" onclick="stepPercentSlider('spacingSlider', -4, () => adjustLineSpacing(true))">-</button>
                    <input type="range" id="spacingSlider" min="-10" max="40" value="5" oninput="adjustLineSpacing(false)" onchange="adjustLineSpacing(true)">
                    <button class="btn-step" onclick="stepPercentSlider('spacingSlider', 4, () => adjustLineSpacing(true))">+</button>
                </div>
            </div>
        </div>
    </div>

    <div id="p-effects" class="context-panel" style="padding: 6px 10px;">
        <div class="effects-grid">
            <div class="effect-row-compact">
                <input type="color" id="outlineColor" value="#ff0000" oninput="applyOutline(false)" onchange="applyOutline(true)" title="Outline Color">
                <button class="btn-step" onclick="stepPercentSlider('outlineSlider', -4, () => applyOutline(true))">-</button>
                <input type="range" id="outlineSlider" min="0" max="15" value="0" oninput="applyOutline(false)" onchange="applyOutline(true)">
                <button class="btn-step" onclick="stepPercentSlider('outlineSlider', 4, () => applyOutline(true))">+</button>
                <span class="mini-label">Outline</span>
            </div>
            
            <div class="effect-row-compact">
                <input type="color" id="itemBorderColor" value="#000000" oninput="applyItemBorder(false)" onchange="applyItemBorder(true)" title="Border Color">
                <button class="btn-step" onclick="stepPercentSlider('itemBorderSlider', -4, () => applyItemBorder(true))">-</button>
                <input type="range" id="itemBorderSlider" min="0" max="20" value="0" oninput="applyItemBorder(false)" onchange="applyItemBorder(true)">
                <button class="btn-step" onclick="stepPercentSlider('itemBorderSlider', 4, () => applyItemBorder(true))">+</button>
                <span class="mini-label">Border</span>
            </div>

            <div class="effect-row-compact">
                <input type="color" id="cardBorderColor" value="#cccccc" oninput="applyCardBorder(false)" onchange="applyCardBorder(true)" title="Card Border Color">
                <button class="btn-step" onclick="stepPercentSlider('cardBorderSlider', -4, () => applyCardBorder(true))">-</button>
                <input type="range" id="cardBorderSlider" min="0" max="25" value="1" oninput="applyCardBorder(false)" onchange="applyCardBorder(true)">
                <button class="btn-step" onclick="stepPercentSlider('cardBorderSlider', 4, () => applyCardBorder(true))">+</button>
                <span class="mini-label">Card Bd</span>
            </div>
        </div>
    </div>

    <div id="p-media" class="context-panel">
        <div class="btn-row" style="margin-bottom: 4px;">
            <button class="btn" onclick="moveLayer('front')">Front</button>
            <button class="btn" onclick="moveLayer('back')">Back</button>
            <button class="btn btn-warning" onclick="toggleRounding()">⭕ Round Image</button>
        </div>
        <div class="btn-row" style="margin-bottom: 4px;">
            <button class="btn" onclick="document.getElementById('photoUpload').click()">📷 Photo</button>
            <button class="btn" onclick="document.getElementById('bgUpload').click()">🖼️ BG</button>
            <button class="btn" onclick="document.getElementById('logoUpload').click()">❇️ Logo</button>
        </div>
        
        <div class="btn-row" style="margin-bottom: 4px; align-items: center; background: #f0f0f0; border-radius: 4px; padding: 2px;">
            <span style="font-size:11px; font-weight:bold; color:#333; flex: 1; text-align: center;">Card BG:</span>
            <input type="color" class="color-box" style="flex: 1; height: 24px; padding: 0; margin-right: 5px;" oninput="changeCardBgColor(this.value, false)" onchange="changeCardBgColor(this.value, true)" title="Card Background Color" value="#ffffff">
            
            <span style="font-size:11px; font-weight:bold; color:#333; flex: 1; text-align: center;">Size:</span>
            <button class="btn btn-icon" style="flex: 1;" onclick="scaleSelectedImage(0.98)" title="Make Smaller">➖</button>
            <button class="btn btn-icon" style="flex: 1;" onclick="scaleSelectedImage(1.02)" title="Make Larger">➕</button>
        </div>
        
        <input type="file" id="photoUpload" hidden accept="image/*" onchange="uploadImage(event, 'photo')">
        <input type="file" id="bgUpload" hidden accept="image/*" onchange="uploadImage(event, 'bg')">
        <input type="file" id="logoUpload" hidden accept="image/*" onchange="uploadImage(event, 'logo')">
    </div>

    <div id="p-project" class="context-panel">
        <div class="btn-row">
            <button class="btn" style="background:#6b7280;" onclick="takeScreenshot()">📸 Screenshot</button>
            <button class="btn btn-success" onclick="downloadPNG()">PNG</button>
            <button class="btn" style="background:#0284c7;" onclick="saveProjectZip()">💾 ZIP</button>
            <button class="btn" style="background:#4b5563;" onclick="document.getElementById('loadInput').click()">📂 Load</button>
        </div>
        <input type="file" id="loadInput" hidden accept=".zip" onchange="loadProject(event)">
    </div>

    <div class="workspace" id="workspaceArea">
        <div id="idCardContainer" class="id-card">
        </div>
    </div>
</div>

<div class="watermark">Made By Raj Kamboj 9465428299</div>

<script>
    lucide.createIcons();
    const idCard = document.getElementById('idCardContainer');
    const workspaceArea = document.getElementById('workspaceArea');
    let selectedElements = [];
    let clipboard = [];
    let history = [];
    let historyIndex = -1;
    let topZ = 600;
    let bgLocked = false;
    let multiSelectMode = false;
    let downloadCounter = 1;
    
    let cardScale = 1.0;
    let initialPinchDistance = null;
    let initialScale = 1.0;

    window.onload = function() {
        const savedData = localStorage.getItem('kambojIDMakerState');
        if (savedData) {
            try {
                const state = JSON.parse(savedData);
                applyState(state);
                const currentSelection = [...selectedElements];
                selectedElements.forEach(el => el.classList.remove('selected'));
                const stateToSave = { html: idCard.innerHTML, bg: idCard.style.backgroundImage, bgColor: idCard.style.backgroundColor, width: idCard.style.width, height: idCard.style.height, border: idCard.style.border };
                history.push(stateToSave);
                historyIndex = 0;
                currentSelection.forEach(el => el.classList.add('selected'));
            } catch (e) {
                console.error("Could not load saved data", e);
                document.querySelectorAll('.draggable').forEach(makeDraggable);
                recordAction();
            }
        } else {
            document.querySelectorAll('.draggable').forEach(makeDraggable);
            recordAction();
        }
    };

    function hardResetApp() {
        if (confirm("Are you sure you want to completely RESET? This will delete all your saved card data!")) {
            localStorage.removeItem('kambojIDMakerState'); 
            document.querySelectorAll('.draggable').forEach(el => el.remove()); 
            idCard.style.backgroundImage = 'none'; 
            idCard.style.backgroundColor = '#ffffff'; 
            idCard.style.border = '1px solid #bbb';
            
            document.getElementById('cardWidth').value = 2.7;
            document.getElementById('cardHeight').value = 4.7;
            resizeCard(); 
            
            history = [];
            historyIndex = -1;
            recordAction(); 
        }
    }

    document.addEventListener('mousedown', function(e) {
        if (!e.target.closest('.draggable') && !e.target.closest('.sticky-header') && !e.target.closest('.context-panel') && !e.target.closest('.zoom-controls')) {
            document.querySelectorAll('.draggable').forEach(d => d.classList.remove('selected'));
            selectedElements = [];
        }
    });

    document.addEventListener('touchstart', function(e) {
        if (!e.target.closest('.draggable') && !e.target.closest('.sticky-header') && !e.target.closest('.context-panel') && !e.target.closest('.zoom-controls')) {
            document.querySelectorAll('.draggable').forEach(d => d.classList.remove('selected'));
            selectedElements = [];
        }
    }, {passive: true});

    function zoomCard(step) {
        cardScale += step;
        if(cardScale < 0.4) cardScale = 0.4;
        if(cardScale > 3.0) cardScale = 3.0;
        idCard.style.transform = `scale(${cardScale})`;
    }

    function resetZoomAndSave() {
        cardScale = 1.0;
        idCard.style.transform = `scale(1)`;
        recordAction();
        setTimeout(() => {
            alert('Zoom reset to 100% and project saved!');
        }, 100);
    }

    workspaceArea.addEventListener('touchstart', function(e) {
        if (e.touches.length === 2) {
            initialPinchDistance = Math.hypot( e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY );
            initialScale = cardScale;
        }
    }, {passive: false});

    workspaceArea.addEventListener('touchmove', function(e) {
        if (e.touches.length === 2) {
            e.preventDefault(); 
            const currentDistance = Math.hypot( e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY );
            if (initialPinchDistance) {
                const scaleChange = currentDistance / initialPinchDistance;
                cardScale = Math.min(Math.max(0.4, initialScale * scaleChange), 3.0);
                idCard.style.transform = `scale(${cardScale})`;
            }
        }
    }, {passive: false});

    workspaceArea.addEventListener('touchend', function(e) { if (e.touches.length < 2) initialPinchDistance = null; });

    function recordAction() {
        const currentSelection = [...selectedElements];
        selectedElements.forEach(el => el.classList.remove('selected'));
        
        const elementsData = [];
        document.querySelectorAll('.draggable').forEach(el => {
            const computedStyle = window.getComputedStyle(el);
            elementsData.push({
                html: el.outerHTML,
                styles: {
                    filter: el.style.filter,
                    transform: el.style.transform,
                    boxShadow: el.style.boxShadow,
                    textShadow: el.style.textShadow,
                    webkitTextStroke: el.style.webkitTextStroke,
                    border: el.style.border,
                    outline: el.style.outline,
                    backgroundColor: el.style.backgroundColor,
                    color: el.style.color,
                    fontFamily: el.style.fontFamily,
                    fontSize: el.style.fontSize,
                    fontWeight: el.style.fontWeight,
                    fontStyle: el.style.fontStyle,
                    width: el.style.width,
                    height: el.style.height,
                    top: el.style.top,
                    left: el.style.left,
                    zIndex: el.style.zIndex,
                    position: el.style.position,
                    borderRadius: el.style.borderRadius,
                    opacity: el.style.opacity
                },
                attributes: {
                    'data-rotation': el.getAttribute('data-rotation'),
                    'data-shadow-angle': el.getAttribute('data-shadow-angle'),
                    'data-depth-angle': el.getAttribute('data-depth-angle')
                }
            });
        });
        
        const state = { 
            html: idCard.innerHTML, 
            bg: idCard.style.backgroundImage, 
            bgColor: idCard.style.backgroundColor, 
            width: idCard.style.width, 
            height: idCard.style.height, 
            border: idCard.style.border,
            elementsData: elementsData,
            cardScale: cardScale
        };
        
        if (historyIndex >= 0 && history[historyIndex].html === state.html && history[historyIndex].border === state.border && history[historyIndex].bgColor === state.bgColor) {
            currentSelection.forEach(el => el.classList.add('selected')); 
            return;
        }
        
        historyIndex++; 
        history = history.slice(0, historyIndex); 
        history.push(state);
        currentSelection.forEach(el => el.classList.add('selected'));

        try {
            localStorage.setItem('kambojIDMakerState', JSON.stringify(state));
        } catch (e) {
            console.warn("Storage full.");
        }
    }

    function handleUndo() { 
        if (historyIndex > 0) { 
            historyIndex--; 
            applyState(history[historyIndex]); 
            try { localStorage.setItem('kambojIDMakerState', JSON.stringify(history[historyIndex])); } catch(e){}
        } 
    }
    
    function handleRedo() { 
        if (historyIndex < history.length - 1) { 
            historyIndex++; 
            applyState(history[historyIndex]); 
            try { localStorage.setItem('kambojIDMakerState', JSON.stringify(history[historyIndex])); } catch(e){}
        } 
    }

    function applyState(state) {
        idCard.innerHTML = state.html; 
        idCard.style.backgroundImage = state.bg; 
        idCard.style.backgroundColor = state.bgColor;
        idCard.style.width = state.width; 
        idCard.style.height = state.height; 
        idCard.style.border = state.border;
        
        if (state.cardScale) {
            cardScale = state.cardScale;
            idCard.style.transform = `scale(${cardScale})`;
        }
        
        let res = parseFloat(document.getElementById('cardRes').value) || 96;
        if (state.width) document.getElementById('cardWidth').value = (parseFloat(state.width) / res).toFixed(2);
        if (state.height) document.getElementById('cardHeight').value = (parseFloat(state.height) / res).toFixed(2);
        
        selectedElements = []; 
        document.querySelectorAll('.draggable').forEach(makeDraggable);
        
        if (state.elementsData && state.elementsData.length > 0) {
            document.querySelectorAll('.draggable').forEach((el, index) => {
                if (state.elementsData[index]) {
                    const data = state.elementsData[index];
                    if (data.styles) {
                        Object.keys(data.styles).forEach(key => {
                            if (data.styles[key]) {
                                el.style[key] = data.styles[key];
                            }
                        });
                    }
                    if (data.attributes) {
                        Object.keys(data.attributes).forEach(key => {
                            if (data.attributes[key]) {
                                el.setAttribute(key, data.attributes[key]);
                            }
                        });
                    }
                }
            });
        }
        
        lucide.createIcons();
    }

    function toggleMultiSelectMode() {
        multiSelectMode = !multiSelectMode;
        const btn = document.getElementById('multiSelectToggleBtnTop');
        if (multiSelectMode) {
            btn.classList.add('active-mode');
        } else {
            btn.classList.remove('active-mode');
        }
    }

    function makeDraggable(el) {
        let p1=0, p2=0, p3=0, p4=0;
        let startX=0, startY=0;
        let isDragging = false; 
        
        el.addEventListener('mousedown', updateInputsFromSelection);
        el.addEventListener('touchstart', updateInputsFromSelection, {passive: true});

        el.onmousedown = el.ontouchstart = function(e) {
            const rect = el.getBoundingClientRect();
            let ex = e.type === "touchstart" ? e.touches[0].clientX : e.clientX;
            let ey = e.type === "touchstart" ? e.touches[0].clientY : e.clientY;
            
            if (ex > rect.right - 20 && ey > rect.bottom - 20) {
                return; 
            }

            if (e.type === "touchstart" && e.cancelable) {
                e.preventDefault();
            }

            if (e.touches && e.touches.length > 1) return;
            if (bgLocked && el.classList.contains('bg-layer')) return;

            const isMulti = e.ctrlKey || e.metaKey || e.shiftKey || multiSelectMode;
            isDragging = false; 
            
            if (!isMulti) {
                if (!selectedElements.includes(el)) {
                    document.querySelectorAll('.draggable').forEach(d => d.classList.remove('selected'));
                    selectedElements = [el];
                }
            } else {
                if (selectedElements.includes(el)) {
                    el.classList.remove('selected');
                    selectedElements = selectedElements.filter(i => i !== el); 
                    return; 
                } else { selectedElements.push(el); }
            }
            selectedElements.forEach(i => i.classList.add('selected'));
            
            p3 = startX = ex; 
            p4 = startY = ey;

            document.onmousemove = document.ontouchmove = function(ev) {
                if (ev.type === "touchmove" && ev.cancelable) {
                    ev.preventDefault(); 
                }
                
                if (ev.touches && ev.touches.length > 1) return; 
                let cx = ev.type === "touchmove" ? ev.touches[0].clientX : ev.clientX;
                let cy = ev.type === "touchmove" ? ev.touches[0].clientY : ev.clientY;
                
                if (!isDragging && Math.abs(cx - startX) < 3 && Math.abs(cy - startY) < 3) {
                    return;
                }
                isDragging = true; 

                p1 = (p3 - cx) / cardScale; 
                p2 = (p4 - cy) / cardScale; 
                p3 = cx; 
                p4 = cy;
                
                selectedElements.forEach(item => {
                    item.style.top = (item.offsetTop - p2) + "px"; 
                    item.style.left = (item.offsetLeft - p1) + "px";
                });
            };

            document.onmouseup = document.ontouchend = function() {
                document.onmousemove = document.ontouchmove = null;
                if (isDragging) {
                    recordAction(); 
                }
            };
        };
    }

    function updateInputsFromSelection() {
        if(selectedElements.length > 0) {
            let el = selectedElements[0];
            if(el.classList.contains('text-item')) {
                let currentSize = parseInt(window.getComputedStyle(el).fontSize);
                if(currentSize) {
                    let sizeCombo = document.getElementById('newTextSize');
                    let found = Array.from(sizeCombo.options).some(opt => opt.value == currentSize);
                    if(found) sizeCombo.value = currentSize;
                }
            }
            let w = el.offsetWidth;
            let h = el.offsetHeight;
            if(w && document.getElementById('widthSlider')) document.getElementById('widthSlider').value = w;
            if(h && document.getElementById('heightSlider')) document.getElementById('heightSlider').value = h;
            
            let rot = el.getAttribute('data-rotation') || 0;
            if(document.getElementById('rotateSlider')) document.getElementById('rotateSlider').value = rot;

            let shadowAngle = el.getAttribute('data-shadow-angle') || 45;
            if(document.getElementById('shadowAngleSlider')) document.getElementById('shadowAngleSlider').value = shadowAngle;

            let depthAngle = el.getAttribute('data-depth-angle') || 45;
            if(document.getElementById('depthAngleSlider')) document.getElementById('depthAngleSlider').value = depthAngle;
        }
    }

    function stepPercentSlider(id, percent, callback) {
        const slider = document.getElementById(id); 
        if(!slider) return;
        
        let currentVal = parseFloat(slider.value);
        let maxVal = parseFloat(slider.max) || 100;
        let minVal = parseFloat(slider.min) || 0;
        
        let range = maxVal - minVal;
        let stepAmount = range * (percent / 100);
        
        if (Math.abs(stepAmount) < 1) {
            stepAmount = percent > 0 ? 1 : -1;
        }
        
        let val = Math.round(currentVal + stepAmount);
        
        if (val < minVal) val = minVal;
        if (val > maxVal) val = maxVal;
        
        slider.value = val; 
        callback(); 
    }

    function scaleSelectedImage(scaleFactor) {
        let targets = selectedElements.length > 0 ? selectedElements : document.querySelectorAll('.bg-layer');
        if(targets.length === 0) return;
        
        targets.forEach(el => {
            if(el.classList.contains('bg-layer') || el.classList.contains('img-item') || el.classList.contains('shape-item') || el.classList.contains('text-item')) {
                let w = el.offsetWidth;
                let h = el.offsetHeight;
                let newW = w * scaleFactor;
                let newH = h * scaleFactor;
                
                let diffW = newW - w;
                let diffH = newH - h;
                
                let currentLeft = el.offsetLeft || 0;
                let currentTop = el.offsetTop || 0;
                
                if(newW > 20 && newH > 20) {
                    el.style.width = newW + 'px';
                    el.style.height = newH + 'px';
                    
                    if(!el.classList.contains('bg-layer')) {
                        el.style.left = (currentLeft - diffW / 2) + 'px';
                        el.style.top = (currentTop - diffH / 2) + 'px';
                    }
                }
            }
        });
        recordAction();
    }

    function resizeSelectedItem(save = false) {
        if(selectedElements.length === 0) return;
        
        const targetW = parseFloat(document.getElementById('widthSlider').value);
        const targetH = parseFloat(document.getElementById('heightSlider').value);
        
        selectedElements.forEach(el => {
            let baseW = el.offsetWidth || 0;
            let baseH = el.offsetHeight || 0;
            
            if (!el.style.width) el.style.width = baseW + 'px';
            if (!el.style.height) el.style.height = baseH + 'px';

            let diffW = targetW - baseW;
            let diffH = targetH - baseH;
            
            let currentLeft = el.offsetLeft || 0;
            let currentTop = el.offsetTop || 0;
            
            el.style.width = targetW + 'px';
            el.style.height = targetH + 'px';
            
            el.style.left = (currentLeft - diffW / 2) + 'px';
            el.style.top = (currentTop - diffH / 2) + 'px';
        });
        if(save) recordAction();
    }

    function rotateSelectedItem(save = false) {
        if(selectedElements.length === 0) return;
        const deg = document.getElementById('rotateSlider').value;
        
        selectedElements.forEach(el => {
            el.style.transform = `rotate(${deg}deg)`;
            el.setAttribute('data-rotation', deg); 
        });
        if(save) recordAction();
    }

    function changeCardBgColor(c, save = false) {
        idCard.style.backgroundColor = c;
        if(save) recordAction();
    }

    function applyOutline(save = false) {
        const w = document.getElementById('outlineSlider').value; 
        const c = document.getElementById('outlineColor').value;
        selectedElements.forEach(el => { 
            if(el.classList.contains('text-item')) {
                el.style.webkitTextStroke = `${w}px ${c}`; 
            } else {
                el.style.outline = `${w}px solid ${c}`; 
            }
        });
        if(save) recordAction();
    }
    
    function applyItemBorder(save = false) {
        const w = document.getElementById('itemBorderSlider').value; 
        const c = document.getElementById('itemBorderColor').value;
        selectedElements.forEach(el => el.style.border = `${w}px solid ${c}`); 
        if(save) recordAction();
    }

    function apply3DDepth(save = false) {
        const d = parseInt(document.getElementById('depthSlider').value); 
        const a = parseFloat(document.getElementById('depthAngleSlider').value);
        const c = document.getElementById('depthColor').value;
        const rad = a * Math.PI / 180;
        const xDir = Math.cos(rad);
        const yDir = Math.sin(rad);

        selectedElements.forEach(el => {
            let s = ''; 
            for(let i=1; i<=d; i++) { 
                s += `${Math.round(i*xDir)}px ${Math.round(i*yDir)}px 0px ${c}${i===d?'':', '}`; 
            }
            if(d===0) s = 'none';
            if(el.classList.contains('text-item')) el.style.textShadow = s; else el.style.boxShadow = s;
            el.setAttribute('data-depth-angle', a);
        }); 
        if(save) recordAction();
    }

    function applyCardBorder(save = false) {
        const w = document.getElementById('cardBorderSlider').value; 
        const c = document.getElementById('cardBorderColor').value;
        idCard.style.border = `${w}px solid ${c}`; 
        if(save) recordAction();
    }

    function changeShadow(save = false) { 
        const v = parseFloat(document.getElementById('shadowSlider').value);
        const a = parseFloat(document.getElementById('shadowAngleSlider').value);
        
        const rad = (a + 90) * Math.PI / 180;
        
        const distance = v * 0.3; 
        const x = (distance * Math.cos(rad)).toFixed(1);
        const y = (distance * Math.sin(rad)).toFixed(1);

        selectedElements.forEach(el => {
            el.style.filter = v > 0 ? `drop-shadow(${x}px ${y}px ${v}px rgba(0,0,0,0.7))` : 'none';
            el.setAttribute('data-shadow-angle', a);
        }); 
        if(save) recordAction(); 
    }

    function adjustLineSpacing(save = false) {
        const gap = document.getElementById('spacingSlider').value;
        if (selectedElements.length < 2) return;
        let sorted = [...selectedElements].sort((a, b) => a.offsetTop - b.offsetTop);
        let top = sorted[0].offsetTop;
        for (let i = 1; i < sorted.length; i++) { 
            top += sorted[i-1].offsetHeight + parseInt(gap); 
            sorted[i].style.top = top + "px"; 
        }
        if(save) recordAction();
    }
    
    function changeFontSizeCombo(size) {
        selectedElements.forEach(el => { 
            if (el.classList.contains('text-item')) el.style.fontSize = size + 'px'; 
        }); 
        if(selectedElements.length > 0) recordAction();
    }

    function positionElement(alignType) {
        if (selectedElements.length === 0) return;
        const cardWidth = idCard.offsetWidth;
        selectedElements.forEach(el => {
            const elWidth = el.offsetWidth;
            if(alignType === 'left') el.style.left = '10px'; 
            else if(alignType === 'center') el.style.left = (cardWidth / 2 - elWidth / 2) + 'px'; 
            else if(alignType === 'right') el.style.left = (cardWidth - elWidth - 10) + 'px';
            el.style.textAlign = alignType; 
        }); 
        recordAction();
    }
    function changeFontFamily(font) { 
        selectedElements.forEach(el => el.style.fontFamily = font); 
        recordAction(); 
    }
    
    function addCustomText() {
        const v = document.getElementById('customTextInput').value; 
        if(!v) return;
        const size = document.getElementById('newTextSize').value || 14;
        const d = document.createElement('div'); 
        d.className='draggable text-item'; 
        d.innerText=v;
        d.style.top='150px'; 
        d.style.left='10px'; 
        d.style.fontFamily = document.getElementById('fontFamilySelect').value;
        d.style.fontSize = size + 'px';
        idCard.appendChild(d); 
        makeDraggable(d); 
        recordAction(); 
        document.getElementById('customTextInput').value = '';
    }

    function addShape() {
        const shapeType = document.getElementById('shapeSelect').value;
        const color = document.getElementById('shapeColor').value;
        const d = document.createElement('div');
        d.className = 'draggable shape-item resizable';
        d.style.top = '100px';
        d.style.left = '50px';
        d.setAttribute('data-rotation', '0');
        
        let content = '';
        if (shapeType === 'square') {
            d.style.width = '80px'; d.style.height = '80px';
            content = `<div style="width:100%; height:100%; background-color:${color}; pointer-events:none;"></div>`;
        } else if (shapeType === 'triangle') {
            d.style.width = '80px'; d.style.height = '80px';
            content = `<svg viewBox="0 0 100 100" preserveAspectRatio="none" style="width:100%; height:100%; pointer-events:none;"><polygon points="50,0 100,100 0,100" fill="${color}"/></svg>`;
        } else if (shapeType === 'circle') {
            d.style.width = '80px'; d.style.height = '80px';
            content = `<svg viewBox="0 0 100 100" preserveAspectRatio="none" style="width:100%; height:100%; pointer-events:none;"><circle cx="50" cy="50" r="50" fill="${color}"/></svg>`;
        } else if (shapeType === 'half_circle') {
            d.style.width = '80px'; d.style.height = '40px';
            content = `<svg viewBox="0 0 100 50" preserveAspectRatio="none" style="width:100%; height:100%; pointer-events:none;"><path d="M0,50 A50,50 0 0,1 100,50 Z" fill="${color}"/></svg>`;
        } else if (shapeType === 'cube') {
            d.style.width = '80px'; d.style.height = '80px';
            content = `<svg viewBox="0 0 100 100" preserveAspectRatio="none" style="width:100%; height:100%; pointer-events:none;">
                <rect x="0" y="30" width="70" height="70" fill="${color}" stroke="#000" stroke-width="2"/>
                <polygon points="0,30 30,0 100,0 70,30" fill="${color}" opacity="0.8" stroke="#000" stroke-width="2"/>
                <polygon points="70,30 100,0 100,70 70,100" fill="${color}" opacity="0.6" stroke="#000" stroke-width="2"/>
            </svg>`;
        } else if (shapeType === 'cylinder') {
            d.style.width = '80px'; d.style.height = '100px';
            content = `<svg viewBox="0 0 100 120" preserveAspectRatio="none" style="width:100%; height:100%; pointer-events:none;">
                <path d="M10,20 v80 a40,15 0 0,0 80,0 v-80 z" fill="${color}" opacity="0.9" stroke="#000" stroke-width="2"/>
                <ellipse cx="50" cy="20" rx="40" ry="15" fill="${color}" stroke="#000" stroke-width="2"/>
            </svg>`;
        } else if (shapeType === 'prism') {
            d.style.width = '80px'; d.style.height = '80px';
            content = `<svg viewBox="0 0 100 100" preserveAspectRatio="none" style="width:100%; height:100%; pointer-events:none;">
                <polygon points="40,20 10,80 70,80" fill="${color}" stroke="#000" stroke-width="2"/>
                <polygon points="40,20 70,80 100,70 70,10" fill="${color}" opacity="0.7" stroke="#000" stroke-width="2"/>
            </svg>`;
        } else if (shapeType === 'sphere') {
            d.style.width = '80px'; d.style.height = '80px';
            content = `<svg viewBox="0 0 100 100" preserveAspectRatio="none" style="width:100%; height:100%; pointer-events:none;">
                <circle cx="50" cy="50" r="48" fill="${color}" stroke="#000" stroke-width="1"/>
                <ellipse cx="35" cy="30" rx="15" ry="8" fill="#ffffff" opacity="0.5" transform="rotate(-30 35 30)"/>
            </svg>`;
        } else if (shapeType === 'hemisphere') {
            d.style.width = '80px'; d.style.height = '60px';
            content = `<svg viewBox="0 0 100 70" preserveAspectRatio="none" style="width:100%; height:100%; pointer-events:none;">
                <path d="M10,20 A40,40 0 0,0 90,20 Z" fill="${color}" opacity="0.9" stroke="#000" stroke-width="2"/>
                <ellipse cx="50" cy="20" rx="40" ry="12" fill="${color}" stroke="#000" stroke-width="2"/>
            </svg>`;
        }
        
        d.innerHTML = content;
        idCard.appendChild(d);
        makeDraggable(d);
        recordAction();
    }

    function editSelectedText() {
        if(selectedElements.length === 1 && selectedElements[0].classList.contains('text-item')) {
            let n = prompt("Edit text:", selectedElements[0].innerText); 
            if(n !== null) { 
                selectedElements[0].innerText = n; 
                recordAction(); 
            }
        }
    }
    function togglePanel(id, btn) { 
        document.querySelectorAll('.context-panel').forEach(p => p.style.display = (p.id === id && p.style.display !== 'block') ? 'block' : 'none'); 
    }
    
    function deleteSelected() { 
        selectedElements.forEach(el => el.remove()); 
        selectedElements = []; 
        recordAction(); 
    }
    
    function uploadImage(e, type) {
        const r = new FileReader(); 
        r.onload = function(ev) {
            const imgObj = new Image();
            imgObj.onload = function() {
                if(type === 'bg') { 
                    const existingBg = idCard.querySelector('.bg-layer');
                    if (existingBg) existingBg.remove();
                    
                    idCard.style.backgroundImage = 'none'; 
                    
                    const w = document.createElement('div'); 
                    w.className = 'draggable bg-layer resizable'; 
                    w.style.width = imgObj.naturalWidth + 'px'; 
                    w.style.height = imgObj.naturalHeight + 'px'; 
                    w.style.top = '0px'; 
                    w.style.left = '0px';
                    w.style.zIndex = '0'; 
                    w.innerHTML = `<img src="${ev.target.result}" style="width:100%; height:100%; object-fit:fill; pointer-events:none;">`; 
                    
                    idCard.insertBefore(w, idCard.firstChild); 
                    makeDraggable(w);
                }
                else {
                    const w = document.createElement('div'); 
                    w.className = 'draggable img-item resizable'; 
                    w.style.width = '80px'; 
                    w.style.height = '80px'; 
                    w.style.top = '100px'; 
                    w.style.left = '90px';
                    w.setAttribute('data-rotation', '0');
                    w.innerHTML = `<img src="${ev.target.result}" style="width:100%; height:100%; border-radius:5px; pointer-events:none;">`; 
                    idCard.appendChild(w); 
                    makeDraggable(w);
                } 
                recordAction();
            };
            imgObj.src = ev.target.result;
        }; 
        r.readAsDataURL(e.target.files[0]);
    }

    function applyColor(c, type, save=true) { 
        selectedElements.forEach(e => { 
            if(type==='text') {
                e.style.color = c; 
            } else {
                if (e.classList.contains('shape-item')) {
                    let innerDiv = e.querySelector('div');
                    let innerSvg = e.querySelector('svg');
                    if(innerDiv) innerDiv.style.backgroundColor = c;
                    if(innerSvg) {
                        innerSvg.querySelectorAll('rect, polygon, path, circle, ellipse').forEach(p => {
                            if (p.getAttribute('fill') !== '#ffffff') {
                                p.setAttribute('fill', c);
                            }
                        });
                    }
                } else {
                    e.style.backgroundColor = c; 
                }
            }
        }); 
        if(save) recordAction(); 
    }

    function applyFormat(t) { 
        selectedElements.forEach(e => { 
            if(t==='bold') e.style.fontWeight = e.style.fontWeight==='bold'?'normal':'bold'; 
            if(t==='italic') e.style.fontStyle = e.style.fontStyle==='italic'?'normal':'italic'; 
        }); 
        recordAction(); 
    }
    
    function doCopy() { 
        if(selectedElements.length > 0) 
            clipboard = selectedElements.map(el => { 
                let c = el.cloneNode(true); 
                c.classList.remove('selected'); 
                return c; 
            }); 
    }
    function doPaste() {
        if(clipboard.length > 0) {
            selectedElements.forEach(el => el.classList.remove('selected')); 
            selectedElements = [];
            clipboard.forEach(el => { 
                let n = el.cloneNode(true); 
                n.style.top = (parseInt(n.style.top) + 20) + "px"; 
                n.style.left = (parseInt(n.style.left) + 20) + "px"; 
                topZ++; 
                n.style.zIndex = topZ; 
                idCard.appendChild(n); 
                makeDraggable(n); 
                n.classList.add('selected'); 
                selectedElements.push(n); 
            }); 
            recordAction();
        }
    }
    
    // ਫਿਕਸਡ ਫੰਕਸ਼ਨ - ਹੁਣ PNG ਸਹੀ ਸੇਵ ਹੋਵੇਗਾ (Android WebView ਲਈ)
    async function captureHighQuality() {
        // ਅਸਥਾਈ ਤੌਰ 'ਤੇ ਸਿਲੈਕਸ਼ਨ ਹਟਾਓ
        const currentlySelected = [...selectedElements];
        currentlySelected.forEach(el => el.classList.remove('selected'));
        
        // ਅਸਲੀ ਸਟਾਈਲ ਸਟੋਰ ਕਰੋ
        const originalTransform = idCard.style.transform;
        const originalOverflow = idCard.style.overflow;
        const originalWidth = idCard.style.width;
        const originalHeight = idCard.style.height;
        
        // --- Android WebView ਲਈ ਫਿਕਸ ---
        // ਕਾਰਡ ਨੂੰ ਇਸਦੇ ਅਸਲੀ ਸਾਈਜ਼ 'ਤੇ ਸੈੱਟ ਕਰੋ (ਬਿਨਾਂ ਸਕੇਲ ਦੇ)
        idCard.style.transform = 'scale(1)';
        
        // ਕਾਰਡ ਦੇ ਅਸਲੀ ਪਿਕਸਲ ਡਾਇਮੈਨਸ਼ਨ ਗਿਣੋ
        let res = parseFloat(document.getElementById('cardRes').value) || 96;
        let wInches = parseFloat(document.getElementById('cardWidth').value) || 2.7;
        let hInches = parseFloat(document.getElementById('cardHeight').value) || 4.7;
        let pixelWidth = Math.round(wInches * res);
        let pixelHeight = Math.round(hInches * res);
        
        idCard.style.width = pixelWidth + 'px';
        idCard.style.height = pixelHeight + 'px';
        idCard.style.overflow = 'visible'; // ਸ਼ੈਡੋ ਲਈ
        
        // ਫੋਰਸ ਰੀਫਲੋ
        idCard.offsetHeight;
        
        return new Promise((resolve) => {
            html2canvas(idCard, {
                scale: 2, // ਮੋਬਾਈਲ ਲਈ ਸਕੇਲ 2 ਕਾਫੀ ਹੈ
                useCORS: true,
                allowTaint: true,
                backgroundColor: null,
                logging: false,
                width: pixelWidth,
                height: pixelHeight,
                windowWidth: pixelWidth,
                windowHeight: pixelHeight,
                onclone: (clonedDoc) => {
                    const clonedCard = clonedDoc.getElementById('idCardContainer');
                    if (clonedCard) {
                        clonedCard.style.overflow = 'visible';
                        // ਸਾਰੇ ਇਫੈਕਟਸ ਨੂੰ ਕਲੋਨ ਵਿੱਚ ਰੱਖੋ
                        clonedCard.querySelectorAll('.draggable').forEach(el => {
                            if (el.style.filter) el.style.filter = el.style.filter;
                            if (el.style.boxShadow) el.style.boxShadow = el.style.boxShadow;
                            if (el.style.textShadow) el.style.textShadow = el.style.textShadow;
                        });
                    }
                }
            }).then(canvas => {
                // ਅਸਲੀ ਸਟਾਈਲ ਵਾਪਸ ਲਗਾਓ
                idCard.style.transform = originalTransform;
                idCard.style.overflow = originalOverflow;
                idCard.style.width = originalWidth;
                idCard.style.height = originalHeight;
                currentlySelected.forEach(el => el.classList.add('selected'));
                selectedElements = currentlySelected;
                
                resolve(canvas);
            }).catch(err => {
                console.error("html2canvas error:", err);
                // ਗਲਤੀ ਹੋਣ 'ਤੇ ਵਾਪਸ ਲਗਾਓ
                idCard.style.transform = originalTransform;
                idCard.style.overflow = originalOverflow;
                idCard.style.width = originalWidth;
                idCard.style.height = originalHeight;
                currentlySelected.forEach(el => el.classList.add('selected'));
                selectedElements = currentlySelected;
                resolve(null);
            });
        });
    }

    async function downloadPNG() {
        const canvas = await captureHighQuality();
        if (!canvas) return;
        
        const link = document.createElement('a');
        link.download = `ID_Card_${downloadCounter}.png`;
        downloadCounter++;
        link.href = canvas.toDataURL('image/png');
        link.click();
    }

    async function takeScreenshot() {
        const canvas = await captureHighQuality();
        if (!canvas) return;
        
        const link = document.createElement('a');
        link.download = `ID_Card_Screenshot_${downloadCounter}.png`;
        downloadCounter++;
        link.href = canvas.toDataURL('image/png');
        link.click();
    }
    
    async function saveProjectZip() {
        const zip = new JSZip(); 
        
        const projectState = {
            html: idCard.innerHTML,
            bg: idCard.style.backgroundImage,
            bgColor: idCard.style.backgroundColor,
            width: idCard.style.width,
            height: idCard.style.height,
            border: idCard.style.border,
            cardScale: cardScale,
            timestamp: new Date().toISOString()
        };
        
        zip.file("project.json", JSON.stringify(projectState, null, 2));
        zip.generateAsync({type:"blob"}).then(c => { 
            const l = document.createElement('a'); 
            l.href = URL.createObjectURL(c); 
            l.download = "ID_Card_Project.zip"; 
            l.click(); 
        });
    }
    
    function loadProject(e) { 
        const file = e.target.files[0]; 
        if (!file) return; 
        
        JSZip.loadAsync(file).then(zip => 
            zip.file("project.json").async("string")
        ).then(data => { 
            const projectData = JSON.parse(data);
            
            document.querySelectorAll('.draggable').forEach(el => el.remove());
            
            idCard.innerHTML = projectData.html;
            idCard.style.backgroundImage = projectData.bg;
            idCard.style.backgroundColor = projectData.bgColor;
            idCard.style.width = projectData.width;
            idCard.style.height = projectData.height;
            idCard.style.border = projectData.border;
            
            if (projectData.cardScale) {
                cardScale = projectData.cardScale;
                idCard.style.transform = `scale(${cardScale})`;
            }
            
            let res = parseFloat(document.getElementById('cardRes').value) || 96;
            if (projectData.width) document.getElementById('cardWidth').value = (parseFloat(projectData.width) / res).toFixed(2);
            if (projectData.height) document.getElementById('cardHeight').value = (parseFloat(projectData.height) / res).toFixed(2);
            
            document.querySelectorAll('.draggable').forEach(makeDraggable);
            
            selectedElements = [];
            recordAction();
            lucide.createIcons();
            
            alert('Project loaded successfully!');
        }).catch(error => {
            console.error('Error loading project:', error);
            alert('Failed to load project. File may be corrupted.');
        });
    }
    
    function clearAllElements() { 
        if (confirm("Clear All Objects? (Note: This does not delete memory. Use the Red Trash button to reset completely.)")) { 
            document.querySelectorAll('.draggable').forEach(el => el.remove()); 
            idCard.style.backgroundImage = 'none'; 
            idCard.style.backgroundColor = '#ffffff'; 
            recordAction(); 
        } 
    }
    
    function toggleRounding() { 
        selectedElements.forEach(el => { 
            const img = el.querySelector('img'); 
            if(img) img.style.borderRadius = img.style.borderRadius === '50%' ? '5px' : '50%'; 
        }); 
        recordAction(); 
    }
    function generateAutoQRCode() {
        let t = []; 
        document.querySelectorAll('.text-item').forEach(e => t.push(e.innerText));
        const c = document.createElement('div'); 
        c.className='draggable'; 
        c.style.bottom='20px'; 
        c.style.left='95px'; 
        idCard.appendChild(c); 
        new QRCode(c, { text: t.join(' | '), width: 70, height: 70 }); 
        makeDraggable(c); 
        recordAction();
    }
    function moveLayer(v) { 
        topZ++; 
        selectedElements.forEach(e => e.style.zIndex = v==='front' ? topZ : 1); 
        recordAction(); 
    }
    function toggleLock() { 
        bgLocked = !bgLocked; 
        const btn = document.getElementById('lockBtnTop');
        if (bgLocked) {
            btn.innerHTML = '<i data-lucide="lock"></i>';
            btn.classList.add('danger-mode');
        } else {
            btn.innerHTML = '<i data-lucide="unlock"></i>';
            btn.classList.remove('danger-mode');
        }
        lucide.createIcons();
    }
    
    function resizeCard() { 
        let wInches = parseFloat(document.getElementById('cardWidth').value) || 2.7;
        let hInches = parseFloat(document.getElementById('cardHeight').value) || 4.7;
        let res = parseFloat(document.getElementById('cardRes').value) || 96;
        
        // ਪਿਕਸਲ ਵਿੱਚ ਸਹੀ ਸਾਈਜ਼ ਗਿਣੋ
        let pixelWidth = Math.round(wInches * res);
        let pixelHeight = Math.round(hInches * res);
        
        // ਫਿਕਸਡ ਪਿਕਸਲ ਡਾਇਮੈਨਸ਼ਨ ਲਗਾਓ
        idCard.style.width = pixelWidth + 'px'; 
        idCard.style.height = pixelHeight + 'px'; 
        
        // ਇਹਨਾਂ ਵੈਲਯੂਜ਼ ਨੂੰ ਡੇਟਾ ਐਟਰੀਬਿਊਟ ਵਿੱਚ ਸਟੋਰ ਕਰੋ
        idCard.dataset.naturalWidth = pixelWidth;
        idCard.dataset.naturalHeight = pixelHeight;
        
        recordAction(); 
    }
</script>
