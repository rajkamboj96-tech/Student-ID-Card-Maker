<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kamboj SoftWares ID Maker Pro (Zoom Added)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root { --primary: #0056b3; --bg: #f1f3f6; }
        body { font-family: Arial, sans-serif; background: var(--bg); margin: 0; padding: 0; overflow: hidden; }

        /* Toolbar */
        .mobile-toolbar { display: flex; width: 100%; background: #fff; border-bottom: 2px solid var(--primary); padding: 4px 0; position: sticky; top: 0; z-index: 1000; justify-content: space-around; }
        .tool-icon { display: flex; flex-direction: column; align-items: center; cursor: pointer; color: #444; padding: 6px; border-radius: 6px; }
        .tool-icon i { width: 18px; height: 18px; }
        .tool-icon.active { color: var(--primary); background: #f0f7ff; }

        /* Panels */
        .context-panel { width: 100%; background: #fff; display: none; padding: 8px 10px; box-sizing: border-box; border-bottom: 1px solid #ddd; max-height: 45vh; overflow-y: auto; }
        .form-group { margin-bottom: 5px; }
        .form-group label { display: block; font-size: 11px; font-weight: bold; color: #555; margin-bottom: 2px; }
        input[type="text"], input[type="number"], select { width: 100%; padding: 4px 6px; border: 1px solid #ccc; border-radius: 4px; font-size: 12px; height: 28px; box-sizing: border-box; }
        
        .btn-row { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
        .btn { flex: 1; padding: 4px; background: var(--primary); color: white; border: none; border-radius: 4px; font-weight: bold; font-size: 11px; cursor: pointer; height: 28px; display: flex; align-items: center; justify-content: center; }
        .btn-danger { background: #dc3545; }
        .btn-warning { background: #ffc107; color: #000; }
        .btn-icon { background: #f0f0f0; color: #333; flex: 0 0 32px; border: 1px solid #ddd; }

        /* COMPACT SLIDERS */
        .effects-grid { display: grid; grid-template-columns: 1fr; gap: 4px; }
        @media (min-width: 768px) {
            .effects-grid { grid-template-columns: repeat(4, 1fr); gap: 8px; }
            .context-panel { max-height: 55vh; }
        }
        .effect-item { display: flex; flex-direction: column; gap: 2px; align-items: center; margin-bottom: 2px; }
        .effect-item label { margin: 0; font-size: 10px; color: #444; font-weight: bold; text-align: center; }
        .slider-group { display: flex; align-items: center; gap: 3px; width: 100%; justify-content: center; }
        .btn-step { background: #e0e0e0; border: 1px solid #ccc; border-radius: 3px; width: 20px; height: 20px; font-weight: bold; font-size: 14px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #333; padding: 0; line-height: 1; }
        input[type="range"] { flex: 1; height: 10px; accent-color: var(--primary); cursor: pointer; margin: 0; }
        input[type="color"] { width: 22px; height: 20px; padding: 0; border: 1px solid #ccc; border-radius: 3px; cursor: pointer; flex-shrink: 0; }

        /* Workspace & Card */
        .workspace { padding: 10px; display: flex; justify-content: center; width: 100%; height: calc(100vh - 55px); overflow: auto; padding-bottom: 50px; position: relative; }
        .id-card { width: 260px; height: 450px; border: 1px solid #bbb; border-radius: 10px; background-color: white; box-shadow: 0 8px 20px rgba(0,0,0,0.1); position: relative; overflow: hidden; flex-shrink: 0; box-sizing: border-box; transform-origin: top center; transition: transform 0.1s ease-out; }
        .id-card-header { background: var(--primary); color: white; padding: 12px 4px; font-size: 14px; font-weight: bold; text-align: center; z-index: 5; position: relative; word-wrap: break-word; }

        .draggable { position: absolute; cursor: move; z-index: 10; touch-action: none; box-sizing: border-box; }
        .selected { outline: 2px dashed #ff0000; outline-offset: 1px; }
        .text-item { font-size: 14px; font-weight: bold; padding: 2px 4px; color: #000; word-wrap: break-word; min-width: 20px; white-space: nowrap; }
        .img-item img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        /* Zoom Controls */
        .zoom-controls { position: fixed; bottom: 30px; left: 15px; display: flex; flex-direction: column; gap: 10px; z-index: 1500; }
        .zoom-controls button { width: 40px; height: 40px; border-radius: 50%; background: var(--primary); color: white; font-size: 24px; font-weight: bold; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .zoom-controls button:active { background: #004494; transform: scale(0.95); }

        /* Watermark */
        .watermark { position: fixed; bottom: 5px; right: 10px; font-size: 12px; color: blue; font-weight: bold; z-index: 2000; pointer-events: none; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="mobile-toolbar">
        <div class="tool-icon" onclick="togglePanel('p-text', this)" title="Text"><i data-lucide="type"></i></div>
        <div class="tool-icon" onclick="togglePanel('p-media', this)" title="Media"><i data-lucide="image"></i></div>
        <div class="tool-icon" onclick="togglePanel('p-design', this)" title="Design"><i data-lucide="palette"></i></div>
        <div class="tool-icon" onclick="togglePanel('p-effects', this)" title="Effects (Sliders)"><i data-lucide="wand-2"></i></div>
        <div class="tool-icon" onclick="togglePanel('p-layers', this)" title="Layers"><i data-lucide="layers"></i></div>
        <div class="tool-icon" onclick="handleUndo()" title="Undo"><i data-lucide="undo-2"></i></div>
        <div class="tool-icon" onclick="handleRedo()" title="Redo"><i data-lucide="redo-2"></i></div>
        <div class="tool-icon" onclick="togglePanel('p-project', this)" title="Project"><i data-lucide="save"></i></div>
    </div>

    <div class="zoom-controls">
        <button onclick="zoomCard(0.1)">+</button>
        <button onclick="zoomCard(-0.1)">-</button>
    </div>

    <div id="p-text" class="context-panel">
        <div class="form-group"><label>Header Text</label><input type="text" id="headerInput" value="Raj Kamboj 9465428299" onkeyup="updateHeader(this.value)" onblur="recordAction()"></div>
        <div class="btn-row">
            <input type="text" id="customTextInput" placeholder="ਟੈਕਸਟ ਲਿਖੋ..." style="flex:2;">
            <button class="btn" style="flex:1;" onclick="addCustomText()">Add Text</button>
        </div>
        <div class="btn-row">
            <button class="btn" onclick="editSelectedText()">✏️ Edit</button>
            <button class="btn btn-warning" onclick="selectAll()">Select All</button>
            <button class="btn btn-danger" onclick="deleteSelected()">🗑️ Del</button>
        </div>
    </div>

    <div id="p-media" class="context-panel">
        <div class="btn-row">
            <button class="btn" onclick="document.getElementById('photoUpload').click()">📷 Photo</button>
            <button class="btn" onclick="document.getElementById('bgUpload').click()">🖼️ BG</button>
            <button class="btn" onclick="document.getElementById('logoUpload').click()">❇️ Logo</button>
        </div>
        <input type="file" id="photoUpload" hidden accept="image/*" onchange="uploadImage(event, 'photo')">
        <input type="file" id="bgUpload" hidden accept="image/*" onchange="uploadImage(event, 'bg')">
        <input type="file" id="logoUpload" hidden accept="image/*" onchange="uploadImage(event, 'logo')">
        <div class="btn-row">
            <button class="btn btn-warning" onclick="toggleRounding()">⭕ Round Image</button>
            <button class="btn btn-success" onclick="generateAutoQRCode()">🔳 Auto QR</button>
        </div>
    </div>

    <div id="p-design" class="context-panel">
        <div class="form-group">
            <label>Font Type</label>
            <select id="fontFamilySelect" onchange="changeFontFamily(this.value)">
                <option value="Arial, sans-serif">Arial</option>
                <option value="'Times New Roman', Times, serif">Times New Roman</option>
                <option value="'Courier New', Courier, monospace">Courier New</option>
                <option value="'Georgia', serif">Georgia</option>
                <option value="'Impact', sans-serif">Impact</option>
            </select>
        </div>
        
        <div class="effects-grid" style="grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); margin-bottom: 6px;">
            <div class="effect-item">
                <label>Font Size</label>
                <div class="slider-group">
                    <button class="btn-step" onclick="stepSlider('fontSizeSlider', -1, () => changeFontSize(true))">-</button>
                    <input type="range" id="fontSizeSlider" min="8" max="80" value="14" oninput="changeFontSize(false)" onchange="changeFontSize(true)">
                    <button class="btn-step" onclick="stepSlider('fontSizeSlider', 1, () => changeFontSize(true))">+</button>
                </div>
            </div>
            <div class="effect-item">
                <label>Drop Shadow</label>
                <div class="slider-group">
                    <button class="btn-step" onclick="stepSlider('shadowSlider', -1, () => changeShadow(true))">-</button>
                    <input type="range" id="shadowSlider" min="0" max="25" value="0" oninput="changeShadow(false)" onchange="changeShadow(true)">
                    <button class="btn-step" onclick="stepSlider('shadowSlider', 1, () => changeShadow(true))">+</button>
                </div>
            </div>
            <div class="effect-item">
                <label>Line Spacing</label>
                <div class="slider-group">
                    <button class="btn-step" onclick="stepSlider('spacingSlider', -1, () => adjustLineSpacing(true))">-</button>
                    <input type="range" id="spacingSlider" min="-10" max="40" value="5" oninput="adjustLineSpacing(false)" onchange="adjustLineSpacing(true)">
                    <button class="btn-step" onclick="stepSlider('spacingSlider', 1, () => adjustLineSpacing(true))">+</button>
                </div>
            </div>
        </div>

        <div class="btn-row">
            <button class="btn btn-icon" onclick="applyFormat('bold')" title="Bold"><i data-lucide="bold" style="width:14px;"></i></button>
            <button class="btn btn-icon" onclick="applyFormat('italic')" title="Italic"><i data-lucide="italic" style="width:14px;"></i></button>
            <button class="btn btn-icon" onclick="positionElement('left')" title="Align Left"><i data-lucide="align-left" style="width:14px;"></i></button>
            <button class="btn btn-icon" onclick="positionElement('center')" title="Align Center"><i data-lucide="align-center" style="width:14px;"></i></button>
            <button class="btn btn-icon" onclick="positionElement('right')" title="Align Right"><i data-lucide="align-right" style="width:14px;"></i></button>
        </div>
        <div class="btn-row">
            <button class="btn" onclick="doCopy()">📄 Copy</button>
            <button class="btn" onclick="doPaste()">📋 Paste</button>
            <input type="color" style="height:28px; flex:1;" onchange="applyColor(this.value, 'text')" title="Text Color">
            <input type="color" style="height:28px; flex:1;" onchange="applyColor(this.value, 'bg')" title="Item BG Color">
        </div>
    </div>

    <div id="p-effects" class="context-panel">
        <div class="effects-grid">
            <div class="effect-item">
                <label>Outline / Stroke</label>
                <div class="slider-group">
                    <input type="color" id="outlineColor" value="#ff0000" onchange="applyOutline(true)">
                    <button class="btn-step" onclick="stepSlider('outlineSlider', -1, () => applyOutline(true))">-</button>
                    <input type="range" id="outlineSlider" min="0" max="15" value="0" oninput="applyOutline(false)" onchange="applyOutline(true)">
                    <button class="btn-step" onclick="stepSlider('outlineSlider', 1, () => applyOutline(true))">+</button>
                </div>
            </div>
            <div class="effect-item">
                <label>Item Border</label>
                <div class="slider-group">
                    <input type="color" id="itemBorderColor" value="#000000" onchange="applyItemBorder(true)">
                    <button class="btn-step" onclick="stepSlider('itemBorderSlider', -1, () => applyItemBorder(true))">-</button>
                    <input type="range" id="itemBorderSlider" min="0" max="20" value="0" oninput="applyItemBorder(false)" onchange="applyItemBorder(true)">
                    <button class="btn-step" onclick="stepSlider('itemBorderSlider', 1, () => applyItemBorder(true))">+</button>
                </div>
            </div>
            <div class="effect-item">
                <label>3D Depth</label>
                <div class="slider-group">
                    <input type="color" id="depthColor" value="#888888" onchange="apply3DDepth(true)">
                    <button class="btn-step" onclick="stepSlider('depthSlider', -1, () => apply3DDepth(true))">-</button>
                    <input type="range" id="depthSlider" min="0" max="30" value="0" oninput="apply3DDepth(false)" onchange="apply3DDepth(true)">
                    <button class="btn-step" onclick="stepSlider('depthSlider', 1, () => apply3DDepth(true))">+</button>
                </div>
            </div>
            <div class="effect-item">
                <label>Card Outer Border</label>
                <div class="slider-group">
                    <input type="color" id="cardBorderColor" value="#cccccc" onchange="applyCardBorder(true)">
                    <button class="btn-step" onclick="stepSlider('cardBorderSlider', -1, () => applyCardBorder(true))">-</button>
                    <input type="range" id="cardBorderSlider" min="0" max="25" value="1" oninput="applyCardBorder(false)" onchange="applyCardBorder(true)">
                    <button class="btn-step" onclick="stepSlider('cardBorderSlider', 1, () => applyCardBorder(true))">+</button>
                </div>
            </div>
        </div>
    </div>

    <div id="p-layers" class="context-panel">
        <div class="btn-row">
            <button class="btn" onclick="moveLayer('front')">Front</button>
            <button class="btn" onclick="moveLayer('back')">Back</button>
            <button class="btn btn-warning" id="lockBtn" onclick="toggleLock()">🔓 Lock BG</button>
        </div>
        <div class="btn-row">
            <input type="number" id="cardWidth" value="260" onchange="resizeCard()">
            <input type="number" id="cardHeight" value="450" onchange="resizeCard()">
        </div>
    </div>

    <div id="p-project" class="context-panel">
        <div class="btn-row">
            <button class="btn btn-success" onclick="downloadPNG()">PNG</button>
            <button class="btn" style="background:#0284c7;" onclick="saveProjectZip()">💾 ZIP</button>
            <button class="btn" style="background:#4b5563;" onclick="document.getElementById('loadInput').click()">📂 Load</button>
        </div>
        <div class="btn-row">
            <button class="btn btn-danger" onclick="clearAllElements()">🧹 Clear All</button>
        </div>
        <input type="file" id="loadInput" hidden accept=".zip" onchange="loadProject(event)">
    </div>

    <div class="workspace" id="workspaceArea">
        <div id="idCardContainer" class="id-card">
            <div id="cardHeader" class="id-card-header">Raj Kamboj 9465428299</div>
        </div>
    </div>
</div>

<div class="watermark">Made By Raj Kamboj 9465428299</div>

<script>
    lucide.createIcons();
    const idCard = document.getElementById('idCardContainer');
    const workspaceArea = document.getElementById('workspaceArea');
    let selectedElements = [];
    let clipboard = [];
    let history = [];
    let historyIndex = -1;
    let topZ = 600;
    let bgLocked = false;
    
    // Zoom Variables
    let cardScale = 1.0;
    let initialPinchDistance = null;
    let initialScale = 1.0;

    // --- Zoom Logic ---
    function zoomCard(step) {
        cardScale += step;
        if(cardScale < 0.4) cardScale = 0.4;
        if(cardScale > 3.0) cardScale = 3.0;
        idCard.style.transform = `scale(${cardScale})`;
    }

    // Touch Pinch-to-Zoom
    workspaceArea.addEventListener('touchstart', function(e) {
        if (e.touches.length === 2) {
            initialPinchDistance = Math.hypot(
                e.touches[0].clientX - e.touches[1].clientX,
                e.touches[0].clientY - e.touches[1].clientY
            );
            initialScale = cardScale;
        }
    }, {passive: false});

    workspaceArea.addEventListener('touchmove', function(e) {
        if (e.touches.length === 2) {
            e.preventDefault(); // Prevent page scroll while zooming
            const currentDistance = Math.hypot(
                e.touches[0].clientX - e.touches[1].clientX,
                e.touches[0].clientY - e.touches[1].clientY
            );
            if (initialPinchDistance) {
                const scaleChange = currentDistance / initialPinchDistance;
                cardScale = Math.min(Math.max(0.4, initialScale * scaleChange), 3.0);
                idCard.style.transform = `scale(${cardScale})`;
            }
        }
    }, {passive: false});

    workspaceArea.addEventListener('touchend', function(e) {
        if (e.touches.length < 2) initialPinchDistance = null;
    });

    // --- History Logic ---
    function recordAction() {
        const currentSelection = [...selectedElements];
        selectedElements.forEach(el => el.classList.remove('selected'));
        const state = { html: idCard.innerHTML, bg: idCard.style.backgroundImage, width: idCard.style.width, height: idCard.style.height, border: idCard.style.border };
        if (historyIndex >= 0 && history[historyIndex].html === state.html && history[historyIndex].border === state.border) {
            currentSelection.forEach(el => el.classList.add('selected')); return;
        }
        historyIndex++; history = history.slice(0, historyIndex); history.push(state);
        currentSelection.forEach(el => el.classList.add('selected'));
    }

    function handleUndo() { if (historyIndex > 0) { historyIndex--; applyState(history[historyIndex]); } }
    function handleRedo() { if (historyIndex < history.length - 1) { historyIndex++; applyState(history[historyIndex]); } }

    function applyState(state) {
        idCard.innerHTML = state.html; idCard.style.backgroundImage = state.bg;
        idCard.style.width = state.width; idCard.style.height = state.height; idCard.style.border = state.border;
        selectedElements = []; document.querySelectorAll('.draggable').forEach(makeDraggable);
    }

    // --- Multi-Select & Drag (Fixed for Zoom) ---
    function makeDraggable(el) {
        let p1=0, p2=0, p3=0, p4=0;
        
        el.addEventListener('mousedown', updateInputsFromSelection);
        el.addEventListener('touchstart', updateInputsFromSelection, {passive: true});

        el.onmousedown = el.ontouchstart = function(e) {
            if (e.touches && e.touches.length > 1) return; // Allow pinch zoom to work without dragging elements
            if (bgLocked && el.classList.contains('bg-layer')) return;

            const isMulti = e.ctrlKey || e.metaKey || e.shiftKey;
            if (!isMulti) {
                if (!selectedElements.includes(el)) {
                    document.querySelectorAll('.draggable').forEach(d => d.classList.remove('selected'));
                    selectedElements = [el];
                }
            } else {
                if (selectedElements.includes(el)) {
                    el.classList.remove('selected');
                    selectedElements = selectedElements.filter(i => i !== el); return;
                } else { selectedElements.push(el); }
            }
            selectedElements.forEach(i => i.classList.add('selected'));
            
            let ex = e.type === "touchstart" ? e.touches[0].clientX : e.clientX;
            let ey = e.type === "touchstart" ? e.touches[0].clientY : e.clientY;
            p3 = ex; p4 = ey;

            document.onmousemove = document.ontouchmove = function(ev) {
                if (ev.touches && ev.touches.length > 1) return; // Prevent drag during pinch zoom
                let cx = ev.type === "touchmove" ? ev.touches[0].clientX : ev.clientX;
                let cy = ev.type === "touchmove" ? ev.touches[0].clientY : ev.clientY;
                
                // IMPORTANT: Divide by scale to maintain correct drag speed when zoomed in/out
                p1 = (p3 - cx) / cardScale; 
                p2 = (p4 - cy) / cardScale; 
                p3 = cx; p4 = cy;
                
                selectedElements.forEach(item => {
                    item.style.top = (item.offsetTop - p2) + "px";
                    item.style.left = (item.offsetLeft - p1) + "px";
                });
            };
            document.onmouseup = document.ontouchend = function() {
                document.onmousemove = document.ontouchmove = null;
                recordAction();
            };
        };
    }

    function updateInputsFromSelection() {
        if(selectedElements.length > 0 && selectedElements[0].classList.contains('text-item')) {
            let currentSize = parseInt(window.getComputedStyle(selectedElements[0]).fontSize);
            if(currentSize) document.getElementById('fontSizeSlider').value = currentSize;
        }
    }

    // --- Slider Logic ---
    function stepSlider(id, step, callback) {
        const slider = document.getElementById(id);
        if(!slider) return;
        let val = parseInt(slider.value) + step;
        if (val < parseInt(slider.min)) val = parseInt(slider.min);
        if (val > parseInt(slider.max)) val = parseInt(slider.max);
        slider.value = val; callback(); 
    }

    function applyOutline(save = false) {
        const w = document.getElementById('outlineSlider').value; const c = document.getElementById('outlineColor').value;
        selectedElements.forEach(el => { if(el.classList.contains('text-item')) el.style.webkitTextStroke = `${w}px ${c}`; else el.style.outline = `${w}px solid ${c}`; });
        if(save) recordAction();
    }
    function applyItemBorder(save = false) {
        const w = document.getElementById('itemBorderSlider').value; const c = document.getElementById('itemBorderColor').value;
        selectedElements.forEach(el => el.style.border = `${w}px solid ${c}`); if(save) recordAction();
    }
    function apply3DDepth(save = false) {
        const d = parseInt(document.getElementById('depthSlider').value); const c = document.getElementById('depthColor').value;
        selectedElements.forEach(el => {
            let s = ''; for(let i=1; i<=d; i++) { s += `${i}px ${i}px 0px ${c}${i===d?'':', '}`; }
            if(d===0) s = 'none';
            if(el.classList.contains('text-item')) el.style.textShadow = s; else el.style.boxShadow = s;
        }); if(save) recordAction();
    }
    function applyCardBorder(save = false) {
        const w = document.getElementById('cardBorderSlider').value; const c = document.getElementById('cardBorderColor').value;
        idCard.style.border = `${w}px solid ${c}`; if(save) recordAction();
    }
    function changeShadow(save = false) { 
        const v = document.getElementById('shadowSlider').value;
        selectedElements.forEach(el => el.style.filter = v > 0 ? `drop-shadow(2px 4px ${v}px rgba(0,0,0,0.6))` : 'none'); if(save) recordAction(); 
    }
    function adjustLineSpacing(save = false) {
        const gap = document.getElementById('spacingSlider').value;
        if (selectedElements.length < 2) return;
        let sorted = [...selectedElements].sort((a, b) => a.offsetTop - b.offsetTop);
        let top = sorted[0].offsetTop;
        for (let i = 1; i < sorted.length; i++) { top += sorted[i-1].offsetHeight + parseInt(gap); sorted[i].style.top = top + "px"; }
        if(save) recordAction();
    }
    function changeFontSize(save = false) {
        const size = document.getElementById('fontSizeSlider').value;
        selectedElements.forEach(el => { if (el.classList.contains('text-item')) el.style.fontSize = size + 'px'; }); if(save) recordAction();
    }
    function positionElement(alignType) {
        if (selectedElements.length === 0) return;
        const cardWidth = idCard.offsetWidth;
        selectedElements.forEach(el => {
            const elWidth = el.offsetWidth;
            if(alignType === 'left') el.style.left = '10px'; else if(alignType === 'center') el.style.left = (cardWidth / 2 - elWidth / 2) + 'px'; else if(alignType === 'right') el.style.left = (cardWidth - elWidth - 10) + 'px';
            el.style.textAlign = alignType; 
        }); recordAction();
    }
    function changeFontFamily(font) { selectedElements.forEach(el => el.style.fontFamily = font); recordAction(); }
    
    // --- Text/Media Actions ---
    function addCustomText() {
        const v = document.getElementById('customTextInput').value; if(!v) return;
        const d = document.createElement('div'); d.className='draggable text-item'; d.innerText=v;
        d.style.top='150px'; d.style.left='10px'; d.style.fontFamily = document.getElementById('fontFamilySelect').value;
        idCard.appendChild(d); makeDraggable(d); recordAction(); document.getElementById('customTextInput').value = '';
    }
    function editSelectedText() {
        if(selectedElements.length === 1 && selectedElements[0].classList.contains('text-item')) {
            let n = prompt("Edit text:", selectedElements[0].innerText); if(n !== null) { selectedElements[0].innerText = n; recordAction(); }
        }
    }
    function togglePanel(id, btn) { document.querySelectorAll('.context-panel').forEach(p => p.style.display = (p.id === id && p.style.display !== 'block') ? 'block' : 'none'); }
    function selectAll() { selectedElements = Array.from(document.querySelectorAll('.draggable')); selectedElements.forEach(el => el.classList.add('selected')); }
    function deleteSelected() { selectedElements.forEach(el => el.remove()); selectedElements = []; recordAction(); }
    function updateHeader(v) { document.getElementById('cardHeader').innerText = v; }
    
    function uploadImage(e, type) {
        const r = new FileReader(); r.onload = function(ev) {
            if(type === 'bg') { idCard.style.backgroundImage = `url(${ev.target.result})`; idCard.style.backgroundSize = 'cover'; }
            else {
                const w = document.createElement('div'); w.className = 'draggable img-item'; w.style.width = '80px'; w.style.height = '80px'; w.style.top = '100px'; w.style.left = '90px';
                w.innerHTML = `<img src="${ev.target.result}" style="width:100%; height:100%; border-radius:5px;">`; idCard.appendChild(w); makeDraggable(w);
            } recordAction();
        }; r.readAsDataURL(e.target.files[0]);
    }

    function applyColor(c, type) { selectedElements.forEach(e => { if(type==='text') e.style.color = c; else e.style.backgroundColor = c; }); recordAction(); }
    function applyFormat(t) { selectedElements.forEach(e => { if(t==='bold') e.style.fontWeight = e.style.fontWeight==='bold'?'normal':'bold'; if(t==='italic') e.style.fontStyle = e.style.fontStyle==='italic'?'normal':'italic'; }); recordAction(); }
    function doCopy() { if(selectedElements.length > 0) clipboard = selectedElements.map(el => { let c = el.cloneNode(true); c.classList.remove('selected'); return c; }); }
    function doPaste() {
        if(clipboard.length > 0) {
            selectedElements.forEach(el => el.classList.remove('selected')); selectedElements = [];
            clipboard.forEach(el => { let n = el.cloneNode(true); n.style.top = (parseInt(n.style.top) + 20) + "px"; n.style.left = (parseInt(n.style.left) + 20) + "px"; topZ++; n.style.zIndex = topZ; idCard.appendChild(n); makeDraggable(n); n.classList.add('selected'); selectedElements.push(n); }); recordAction();
        }
    }
    
    function downloadPNG() {
        selectedElements.forEach(el => el.classList.remove('selected'));
        // Temporarily reset scale for clear snapshot
        idCard.style.transform = 'scale(1)';
        setTimeout(() => {
            html2canvas(idCard, { scale: 3 }).then(canvas => {
                const l = document.createElement('a'); l.download = 'ID_Card.png'; l.href = canvas.toDataURL(); l.click();
                idCard.style.transform = `scale(${cardScale})`; // Restore scale
            });
        }, 100);
    }
    async function saveProjectZip() {
        const zip = new JSZip(); zip.file("project.json", JSON.stringify({ html: idCard.innerHTML, bg: idCard.style.backgroundImage, width: idCard.style.width, height: idCard.style.height, border: idCard.style.border }));
        zip.generateAsync({type:"blob"}).then(c => { const l = document.createElement('a'); l.href = URL.createObjectURL(c); l.download = "ID_Card_Project.zip"; l.click(); });
    }
    function loadProject(e) { const file = e.target.files[0]; if (!file) return; JSZip.loadAsync(file).then(zip => zip.file("project.json").async("string").then(data => { applyState(JSON.parse(data)); recordAction(); })); }
    function clearAllElements() { if (confirm("Clear All?")) { document.querySelectorAll('.draggable').forEach(el => el.remove()); idCard.style.backgroundImage = 'none'; recordAction(); } }
    function toggleRounding() { selectedElements.forEach(el => { const img = el.querySelector('img'); if(img) img.style.borderRadius = img.style.borderRadius === '50%' ? '5px' : '50%'; }); recordAction(); }
    function generateAutoQRCode() {
        let t = []; document.querySelectorAll('.text-item').forEach(e => t.push(e.innerText));
        const c = document.createElement('div'); c.className='draggable'; c.style.bottom='20px'; c.style.left='95px'; idCard.appendChild(c); new QRCode(c, { text: t.join(' | '), width: 70, height: 70 }); makeDraggable(c); recordAction();
    }
    function moveLayer(v) { topZ++; selectedElements.forEach(e => e.style.zIndex = v==='front' ? topZ : 1); recordAction(); }
    function toggleLock() { bgLocked = !bgLocked; alert(bgLocked ? "BG Locked" : "Unlocked"); }
    function resizeCard() { idCard.style.width = document.getElementById('cardWidth').value + 'px'; idCard.style.height = document.getElementById('cardHeight').value + 'px'; recordAction(); }

    window.onload = recordAction;
</script>
</body>
</html>
